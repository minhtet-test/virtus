name: Build Android APK

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-22.04 

    steps:
    - name: Checkout source
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev

    - name: Install Buildozer
      run: |
        pip install --upgrade pip
        # ဒီနေရာမှာ Cython version ကို 0.29.33 အဖြစ် ပြောင်းထားပါတယ်
        pip install buildozer cython==0.29.33 virtualenv

    - name: Build with Buildozer
      run: yes | buildozer android debug

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: KoCLay-App-APK
        path: bin/*.apk
