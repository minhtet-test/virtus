name: Build Android APK

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # ၁။ Code တွေကို ဆွဲယူမယ်
    - name: Checkout source
      uses: actions/checkout@v4  # <-- ဒီနေရာမှာ v4 ပြောင်းလိုက်ပါတယ်

    # ၂။ Buildozer သုံးပြီး APK ထုတ်မယ်
    - name: Build with Buildozer
      uses: ArtemSBulgakov/buildozer-action@v1
      id: buildozer
      with:
        command: buildozer android debug
        buildozer_version: master

    # ၃။ ရလာတဲ့ APK ဖိုင်ကို Download ဆွဲလို့ရအောင် တင်ပေးမယ်
    - name: Upload artifacts
      uses: actions/upload-artifact@v4  # <-- ဒီနေရာမှာ v4 ပြောင်းလိုက်ပါတယ် (Error တက်တဲ့နေရာပါ)
      with:
        name: KoCLay-App-APK
        path: bin/*.apk
